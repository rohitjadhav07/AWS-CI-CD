version: 0.2

phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing Docker...

  pre_build:
    commands:
      - echo Pre build phase

  build:
    commands:
      - echo Building Docker image
      - docker build -t myapp .

      - echo Running Docker container
      - docker run -d -p 5000:5000 myapp

      - echo Listing running containers
      - docker ps

  post_build:
    commands:
      - echo Build completed
